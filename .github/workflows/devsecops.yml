name: DevSecOps Pipeline

# Esteira de segurança do MercadoLeve.
# Executa as cinco análises obrigatórias: Secret Detection, SCA, SAST,
# IaC Scanning e DAST. Os resultados em formato SARIF são enviados para
# a aba Security do GitHub (Code Scanning).

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ----------------------------------------------------------------------
  # 1) SECRET DETECTION — varre todo o histórico de commits por segredos
  # ----------------------------------------------------------------------
  secret-detection:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # histórico completo é necessário para varrer commits antigos
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"

  # ----------------------------------------------------------------------
  # 2) SCA — vulnerabilidades em dependências de terceiros
  # ----------------------------------------------------------------------
  sca:
    name: SCA (pip-audit + Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: pip-audit
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt --desc --format json --output pip-audit.json || true
          pip-audit -r requirements.txt --desc || true
      - name: Trivy filesystem (dependências)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          format: sarif
          output: trivy-sca.sarif
          severity: CRITICAL,HIGH,MEDIUM
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-sca.sarif
          category: trivy-sca
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-reports
          path: pip-audit.json

  # ----------------------------------------------------------------------
  # 3) SAST — análise estática do código-fonte
  # ----------------------------------------------------------------------
  sast:
    name: SAST (Semgrep + Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Semgrep
        run: |
          python -m pip install --upgrade pip semgrep
          semgrep scan --config=p/python --config=p/security-audit \
            --sarif --output=semgrep.sarif app/ || true
          semgrep scan --config=p/python --config=p/security-audit app/ || true
      - name: Bandit
        run: |
          python -m pip install bandit
          bandit -r app/ -f json -o bandit.json || true
          bandit -r app/ || true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-reports
          path: |
            semgrep.sarif
            bandit.json

  # ----------------------------------------------------------------------
  # 4) IaC SCANNING — Dockerfile, docker-compose, Terraform e Kubernetes
  # ----------------------------------------------------------------------
  iac-scan:
    name: IaC Scanning (Checkov + Trivy config)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: dockerfile,terraform,kubernetes,docker_compose
          output_format: cli,sarif
          output_file_path: console,checkov.sarif
          soft_fail: true
      - name: Trivy config (IaC)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-iac.sarif
          severity: CRITICAL,HIGH,MEDIUM
      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif
          category: checkov
      - name: Upload Trivy IaC SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-iac.sarif
          category: trivy-iac

  # ----------------------------------------------------------------------
  # 5) DAST — análise dinâmica contra a aplicação em execução
  # ----------------------------------------------------------------------
  dast:
    name: DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: [sast, sca]
    steps:
      - uses: actions/checkout@v4
      - name: Subir aplicação (docker compose)
        run: |
          docker compose up -d --build
          echo "Aguardando a API responder..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then echo "OK"; break; fi
            sleep 3
          done
      - name: Popular dados de exemplo
        run: docker compose exec -T api python -m scripts.seed || true
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:8000"
          cmd_options: "-a"
          fail_action: false
      - name: Encerrar aplicação
        if: always()
        run: docker compose down -v
